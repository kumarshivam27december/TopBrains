<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Index - Simple Calculator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">

    <style>
        body {
            background: #e9ecef;
        }

        .calculator {
            max-width: 400px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .result-box {
            background: #dee2e6;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-top: 20px;
        }

        button {
            width: 100%;
        }
    </style>

</head>

<body>

    <div class="calculator">

        <h3 class="text-center mb-3">Index - Simple Calculator</h3>
        <p class="text-center text-muted">Trainer Name: Mohd Salman</p>

        <div class="mb-3">
            <label class="form-label">First Number (Integer)</label>
            <input type="number" id="num1" class="form-control" value="45">
        </div>

        <div class="mb-3">
            <label class="form-label">Second Number (Integer)</label>
            <input type="number" id="num2" class="form-control" value="12">
        </div>

        <div class="row g-2">
            <div class="col-6">
                <button class="btn btn-success" onclick="add()">Add</button>
            </div>

            <div class="col-6">
                <button class="btn btn-primary" onclick="subtract()">Subtract</button>
            </div>

            <div class="col-6">
                <button class="btn btn-warning" onclick="multiply()">Multiply</button>
            </div>

            <div class="col-6">
                <button class="btn btn-danger" onclick="divide()">Division</button>
            </div>
        </div>

        <div class="result-box">
            <h6>Calculated Result</h6>
            <h4 id="result">Result will appear here</h4>
        </div>

    </div>

    <script>
        function getNumbers() {
            let a = parseFloat(document.getElementById("num1").value);
            let b = parseFloat(document.getElementById("num2").value);
            return { a, b };
        }

        function add() {
            let { a, b } = getNumbers();
            let result = a + b;
            document.getElementById("result").innerText = `${a} + ${b} = ${result}`;
        }

        function subtract() {
            let { a, b } = getNumbers();
            let result = a - b;
            document.getElementById("result").innerText = `${a} - ${b} = ${result}`;
        }

        function multiply() {
            let { a, b } = getNumbers();
            let result = a * b;
            document.getElementById("result").innerText = `${a} × ${b} = ${result}`;
        }

        function divide() {
            let { a, b } = getNumbers();

            if (b === 0) {
                document.getElementById("result").innerText = "Cannot divide by zero";
                return;
            }

            let result = (a / b).toFixed(2);
            document.getElementById("result").innerText = `${a} ÷ ${b} = ${result}`;
        }
    </script>
</body>

</html>
